name: QA Lab — Cypress + Mochawesome

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 11 * * 1'   # Monday 11:00 UTC

permissions:
  contents: write   # required for peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  test:
    name: Run Cypress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run smoke tests
        run: npx cypress run --env grep=@smoke
        env:
          BASE_URL: https://subbotin.es

      - name: Run full regression
        if: github.ref == 'refs/heads/main'
        run: npx cypress run
        env:
          BASE_URL: https://subbotin.es

      - name: Merge Mochawesome reports
        if: always()
        run: |
          if compgen -G "cypress/reports/mochawesome/*.json" > /dev/null; then
            npm run report:merge
          else
            echo "No Mochawesome JSON files found — tests did not produce reports"
          fi

      - name: Generate HTML report
        if: always()
        run: |
          if [ -f cypress/reports/report.json ]; then
            npm run report:generate
          else
            echo "No merged report.json found — skipping HTML generation"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: cypress/reports/html/
          retention-days: 30

      - name: Upload videos artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 7

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress/reports/html
          destination_dir: mochawesome

  performance:
    name: Artillery SLO + Browser Load
    runs-on: ubuntu-latest
    needs: test          # run after Cypress tests pass
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (for browser scenarios)
        run: npx playwright install --with-deps chromium

      - name: Create results directory
        run: mkdir -p performance/artillery/results

      - name: Run HTTP smoke test
        run: npm run perf:smoke

      - name: Run HTTP baseline (main only)
        if: github.ref == 'refs/heads/main'
        run: npm run perf:baseline

      - name: Run browser load test (main only)
        if: github.ref == 'refs/heads/main'
        run: npm run perf:browser

      - name: Upload Artillery results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artillery-results
          path: performance/artillery/results/
          retention-days: 14
